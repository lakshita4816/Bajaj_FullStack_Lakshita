<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BFHL Hierarchy Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left" aria-hidden="true"></div>
    <div class="ambient ambient-right" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero reveal">
        <p class="badge">SRM Full Stack Challenge</p>
        <h1>Hierarchy Engine</h1>
        <p class="subtitle">
          Paste your node edges and get a clean tree/cycle analysis from the
          <code>/bfhl</code> API.
        </p>
      </header>

      <section class="panel reveal reveal-delay-1">
        <div class="panel-header">
          <h2>Input</h2>
          <label class="switch-row" for="api-url">
            API URL
            <input id="api-url" type="text" value="/bfhl" />
          </label>
        </div>

        <textarea
          id="node-input"
          placeholder='Example: ["A->B", "A->C", "B->D"]'
          rows="6"
        ></textarea>

        <div class="action-row">
          <button id="submit-btn" type="button">Analyze Hierarchies</button>
          <button id="sample-btn" type="button" class="ghost">Load Sample</button>
        </div>

        <p id="error-box" class="error-box" role="alert"></p>
      </section>

      <section class="panel reveal reveal-delay-2">
        <div class="panel-header">
          <h2>Response</h2>
        </div>
        <div id="response-root" class="response-root">
          <p class="muted">Submit data to view structured output.</p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
